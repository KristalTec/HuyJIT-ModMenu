name: Build HuyJIT Mod Menu

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
          
      - name: Install iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          wget https://github.com/theos/sdks/releases/download/iphoneos15.5/iPhoneOS15.5.sdk.tar.xz
          tar -xJf iPhoneOS15.5.sdk.tar.xz
          echo "SDKROOT=$HOME/theos/sdks/iPhoneOS15.5.sdk" >> $GITHUB_ENV
          echo "IPHONEOS_DEPLOYMENT_TARGET=15.5" >> $GITHUB_ENV
      
      - name: Build Package
        run: |
          make package
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HuyJIT-ModMenu
          path: |
            packages/*.deb
            .theos/obj/*.dylib
